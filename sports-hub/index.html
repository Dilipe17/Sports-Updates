<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Sports Hub – Live Scores, News &amp; AI Assistant</title>
    <meta name="description" content="Get live scores, breaking news, schedules and AI-powered sports insights for NFL, NBA, MLB, Soccer, NHL and more." />
    <meta name="theme-color" content="#1A1A2E" />

    <!-- Favicon (inline SVG – no file required) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Sports Hub – Live Scores, News &amp; AI Assistant" />
    <meta property="og:description" content="Live scores, breaking news, schedules and AI sports insights — all in one place." />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Sports Hub" />
    <meta name="twitter:description" content="Live scores, news and an AI sports assistant — powered by ESPN &amp; AWS Bedrock." />

    <!-- Pre-connect to ESPN API for faster first fetch -->
    <link rel="preconnect" href="https://site.api.espn.com" crossorigin />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background-color: #1A1A2E;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* Thin scrollbars for chat panels */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
